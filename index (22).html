async function processPendingInvite(me, invite) {
  const {inviteCode, inviteDuelId, inviteSeriesId} = invite;
  if(!inviteCode) return;
  try {
    const code = inviteCode.toUpperCase();
    // 1. Look up challenger by join code
    const idx = await sget('code_index') || {};
    const challengerId = idx[code];
    if(!challengerId || challengerId === me.id) return;

    // 2. Add challenger as friend
    const fl = JSON.parse(localStorage.getItem('dd_friends') || '[]');
    if(!fl.includes(challengerId)) {
      fl.push(challengerId);
      localStorage.setItem('dd_friends', JSON.stringify(fl));
    }

    // 3. Find the challenge — check by duelId first, then by pending_challenge code
    let ch = null;
    if(inviteDuelId) {
      const inbox = await sget('challenges:'+me.id) || [];
      ch = inbox.find(c => c.duelId === inviteDuelId);
      if(!ch) {
        // Check if stored by join code (new user flow)
        const pending = await sget('pending_challenge:'+code);
        if(pending && pending.duelId === inviteDuelId) ch = pending;
      }
    } else {
      // No duelId in URL — grab the most recent pending challenge from challenger
      ch = await sget('pending_challenge:'+code);
    }

    if(ch) {
      // Update challenge with recipient's real info
      const updated = {...ch, opponentId: me.id, opponentName: me.name,
        opponentAvatar: me.avatar||'⚾', opponentColor: me.color||'#e84545'};
      // Deliver to recipient inbox
      const inbox = await sget('challenges:'+me.id) || [];
      const alreadyThere = inbox.find(x => x.duelId === updated.duelId);
      if(!alreadyThere) {
        inbox.push(updated);
        await sset('challenges:'+me.id, inbox);
      }
      // Update challenger's sent list with opponent info
      const sent = await sget('challenges_sent:'+challengerId) || [];
      const updatedSent = sent.map(x => x.duelId === updated.duelId
        ? {...x, opponentId: me.id, opponentName: me.name, opponentAvatar: me.avatar||'⚾'}
        : x);
      await sset('challenges_sent:'+challengerId, updatedSent);
      // Also update the inbox entry for challenger (they stored by opp.id which may have been a placeholder)
      const challengerInbox = await sget('challenges:'+challengerId) || [];
      // Clean up the pending_challenge key (it's been claimed)
      await sset('pending_challenge:'+code, null);
    }
  } catch(e) {
    console.warn('processPendingInvite failed:', e);
  }
}
