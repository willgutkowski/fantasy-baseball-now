  }catch(e){

    return {lineup:[], bench:[], pitchers:[]};
  }
}


// ── MLB Split Stats Engine ──
const _statCache = {};
const MLB = 'https://statsapi.mlb.com/api/v1';
const today = () => new Date().toLocaleDateString('en-CA');
const daysAgo = (n) => { const d = new Date(); d.setDate(d.getDate()-n); return d.toLocaleDateString('en-CA'); };
const currentYear = new Date().getFullYear();

async function mlbGet(url) {
  const cached = _statCache[url];
  if(cached && Date.now() - cached.ts < 300000) return cached.data; // 5min cache
  try {
    const r = await fetch(url);
    if(!r.ok) return null;
    const data = await r.json();
    _statCache[url] = {data, ts: Date.now()};
    return data;
  } catch(e) { return null; }
}

function fmtAvg(n) { if(!n||isNaN(n)) return '.---'; return Number(n).toFixed(3).replace('0.','.'); }
function fmtEra(n) { if(!n||isNaN(n)) return '-.--'; return Number(n).toFixed(2); }
function fmtOps(n) { if(!n||isNaN(n)) return '.---'; return Number(n).toFixed(3).replace(/^0/,''); }

// Fetch season stats (hitting or pitching)
async function fetchSeasonStats(mlbId, group, year) {
  if(!mlbId) return {};
  const url = `${MLB}/people/${mlbId}/stats?stats=season&group=${group}&season=${year}&gameType=R`;
  const data = await mlbGet(url);
  return data?.stats?.[0]?.splits?.[0]?.stat || {};
}

// Fetch previous season stats
async function fetchPrevSeasonStats(mlbId, group) {
  if(!mlbId) return {};
  const url = `${MLB}/people/${mlbId}/stats?stats=season&group=${group}&season=${currentYear-1}&gameType=R`;
  const data = await mlbGet(url);
  return data?.stats?.[0]?.splits?.[0]?.stat || {};
}

// Fetch last N days stats using dateRange
async function fetchDateRangeStats(mlbId, group, startDate, endDate) {
  if(!mlbId) return {};
  const url = `${MLB}/people/${mlbId}/stats?stats=byDateRange&group=${group}&season=${currentYear}&startDate=${startDate}&endDate=${endDate}&gameType=R`;
  const data = await mlbGet(url);
  return data?.stats?.[0]?.splits?.[0]?.stat || {};
}

// Fetch game log and aggregate last N games
async function fetchLastNGames(mlbId, group, n) {
  if(!mlbId) return {};
  const url = `${MLB}/people/${mlbId}/stats?stats=gameLog&group=${group}&season=${currentYear}&gameType=R`;
  const data = await mlbGet(url);
  const splits = data?.stats?.[0]?.splits || [];
  const recent = splits.slice(-n); // last N games
  if(!recent.length) return {};
  if(group === 'hitting') {
    const ab = recent.reduce((s,g) => s+(g.stat.atBats||0), 0);
    const h  = recent.reduce((s,g) => s+(g.stat.hits||0), 0);
    const hr = recent.reduce((s,g) => s+(g.stat.homeRuns||0), 0);
    const rbi= recent.reduce((s,g) => s+(g.stat.rbi||0), 0);
    const sb = recent.reduce((s,g) => s+(g.stat.stolenBases||0), 0);
    const bb = recent.reduce((s,g) => s+(g.stat.baseOnBalls||0), 0);
    const k  = recent.reduce((s,g) => s+(g.stat.strikeOuts||0), 0);
    const ops= recent.reduce((s,g) => s+(parseFloat(g.stat.ops)||0), 0) / (recent.length||1);
    return {avg: ab>0?h/ab:0, homeRuns:hr, rbi, stolenBases:sb, baseOnBalls:bb, strikeOuts:k,
            ops: ops, atBats:ab, hits:h, gamesPlayed:recent.length};
  } else {
    const ip   = recent.reduce((s,g) => s+(parseFloat(g.stat.inningsPitched)||0), 0);
    const er   = recent.reduce((s,g) => s+(g.stat.earnedRuns||0), 0);
    const k    = recent.reduce((s,g) => s+(g.stat.strikeOuts||0), 0);
    const bb   = recent.reduce((s,g) => s+(g.stat.baseOnBalls||0), 0);
    const h    = recent.reduce((s,g) => s+(g.stat.hits||0), 0);
    const era  = ip>0?(er*9/ip):0;
    return {era, inningsPitched:ip.toFixed(1), strikeOuts:k, baseOnBalls:bb, hits:h, gamesPlayed:recent.length};
  }
}

// Fetch batter vs specific pitcher (career)
async function fetchBatterVsPitcher(batterId, pitcherId) {
  if(!batterId||!pitcherId) return {};
  const url = `${MLB}/people/${batterId}/stats?stats=vsPlayer&group=hitting&opposingPlayerId=${pitcherId}&gameType=R`;
  const data = await mlbGet(url);
  return data?.stats?.[0]?.splits?.[0]?.stat || {};
}

// Fetch pitcher vs team lineup (aggregate all batters)
async function fetchPitcherVsTeam(pitcherId, teamId) {
  if(!pitcherId||!teamId) return {};
  const url = `${MLB}/people/${pitcherId}/stats?stats=vsTeam&group=pitching&opposingTeamId=${teamId}&season=${currentYear}&gameType=R`;
  const data = await mlbGet(url);
  return data?.stats?.[0]?.splits?.[0]?.stat || {};
}

// Fetch handedness splits (vs LHP/RHP)
async function fetchHandSplits(mlbId, group) {
  if(!mlbId) return {};
  const url = `${MLB}/people/${mlbId}/stats?stats=statSplits&group=${group}&season=${currentYear}&gameType=R`;
  const data = await mlbGet(url);
  const splits = data?.stats?.[0]?.splits || [];
  const vsL = splits.find(s=>s.split?.description==='vs. Left'||s.split?.code==='vl')?.stat||{};
  const vsR = splits.find(s=>s.split?.description==='vs. Right'||s.split?.code==='vr')?.stat||{};
  return {vsL, vsR};
}

// Main: fetch all stats for a player given a filter
// Returns a formatted stat line string
async function fetchFilteredStats(player, filter, game, side) {
  if(!player||!player.mlbId) return slotMetaTxt(player, game, side, filter);
  const id = player.mlbId;
  const isPit = player.isPitcher || player.pos==='SP' || player.pos==='BULLPEN';
  const group = isPit ? 'pitching' : 'hitting';
  const oppSP = side==='away' ? game?.homeSP : game?.awaySP;
  const oppTeamId = side==='away' ? game?.homeTeamId : game?.awayTeamId;

  try {
    if(filter === 'season') {
      const st = await fetchSeasonStats(id, group, currentYear);
      if(isPit) return `${player.throws||'R'}HP · ERA ${fmtEra(st.era)} · ${st.strikeOuts||0}K · ${fmtEra(st.whip)} WHIP`;
      return `${player.bats||'R'}HB · ${fmtAvg(st.avg)} AVG · ${st.homeRuns||0}HR · ${st.rbi||0}RBI · ${fmtOps(st.ops)} OPS`;
    }
    if(filter === 'prev') {
      const st = await fetchPrevSeasonStats(id, group);
      if(isPit) return `${player.throws||'R'}HP · ERA ${fmtEra(st.era)} · ${st.strikeOuts||0}K · ${currentYear-1}`;
      return `${player.bats||'R'}HB · ${fmtAvg(st.avg)} · ${st.homeRuns||0}HR · ${st.rbi||0}RBI · ${currentYear-1}`;
    }
    if(filter === 'last1') {
      const st = await fetchLastNGames(id, group, 1);
      if(isPit) return `Last game · ${st.inningsPitched||'0'}IP · ${st.strikeOuts||0}K · ERA ${fmtEra(st.era)}`;
      const h=st.hits||0, ab=st.atBats||0;
      return `Last game · ${h}-${ab} · ${st.homeRuns||0}HR · ${st.rbi||0}RBI`;
    }
    if(filter === 'last7') {
      const st = await fetchLastNGames(id, group, 7);
      if(isPit) return `L7 · ${st.gamesPlayed||0}G · ERA ${fmtEra(st.era)} · ${st.strikeOuts||0}K`;
      return `L7 · ${fmtAvg(st.avg)} AVG · ${st.homeRuns||0}HR · ${st.rbi||0}RBI · ${fmtOps(st.ops)} OPS`;
    }
    if(filter === 'last30') {
      const st = await fetchLastNGames(id, group, 30);
      if(isPit) return `L30 · ERA ${fmtEra(st.era)} · ${st.strikeOuts||0}K · ${fmtEra(st.whip)} WHIP`;
      return `L30 · ${fmtAvg(st.avg)} AVG · ${st.homeRuns||0}HR · ${st.rbi||0}RBI · ${fmtOps(st.ops)} OPS`;
    }
    if(filter === 'last60') {
      const st = await fetchLastNGames(id, group, 60);
      if(isPit) return `L60 · ERA ${fmtEra(st.era)} · ${st.strikeOuts||0}K`;
      return `L60 · ${fmtAvg(st.avg)} AVG · ${st.homeRuns||0}HR · ${st.rbi||0}RBI`;
    }
    if(filter === 'vs_sp' && !isPit) {
      if(oppSP?.mlbId) {
        const st = await fetchBatterVsPitcher(id, oppSP.mlbId);
        const ab=st.atBats||0, h=st.hits||0, hr=st.homeRuns||0;
        if(ab>0) return `vs ${oppSP.name?.split(' ').slice(-1)[0]||'SP'} · ${h}-${ab} (${fmtAvg(ab>0?h/ab:0)}) · ${hr}HR`;
      }
      // Fallback: vs pitcher handedness
      const hand = oppSP?.hand||'R';
      const splits = await fetchHandSplits(id, group);
      const st = hand==='L' ? splits.vsL : splits.vsR;
      const spName = oppSP?.name?.split(' ').slice(-1)[0]||'SP';
      return `vs ${hand}HP (${spName}) · ${fmtAvg(st.avg)} AVG · ${st.homeRuns||0}HR · ${st.rbi||0}RBI`;
    }
    if(filter === 'vs_lu' && isPit) {
      if(oppTeamId) {
        const st = await fetchPitcherVsTeam(id, oppTeamId);
        if(st.inningsPitched) {
          const teamAbbr = side==='away' ? (game?.home||'OPP') : (game?.away||'OPP');
          return `vs ${teamAbbr} · ${st.inningsPitched}IP · ERA ${fmtEra(st.era)} · ${st.strikeOuts||0}K`;
        }
      }
      // Fallback to season
      const st = await fetchSeasonStats(id, group, currentYear);
      return `${player.throws||'R'}HP · ERA ${fmtEra(st.era)} · ${st.strikeOuts||0}K vs lineup`;
    }
  } catch(e) {}
  return slotMetaTxt(player, game, side, filter);
}

function getPlayerStats(player, liveData){
  if(!liveData)return null;
  const {playerStats}=liveData;
  // 1. mlbId lookup (most reliable)
  let raw=player.mlbId&&playerStats[String(player.mlbId)]?playerStats[String(player.mlbId)]:null;
  // 2. Full name lookup
  if(!raw&&player.name)raw=playerStats[player.name.toLowerCase()]||null;
  // 3. Last name match (handles Jr./Sr., nicknames)
  if(!raw&&player.name){
    const lastName=player.name.trim().split(' ').slice(-1)[0].toLowerCase();
    if(lastName.length>3){
      const matchKey=Object.keys(playerStats).find(k=>k.split(' ').slice(-1)[0]===lastName);
      if(matchKey)raw=playerStats[matchKey];
    }
  }
  // 4. First initial + last name match (e.g. "F. Freeman" → "Freddie Freeman")
  if(!raw&&player.name){
    const parts=player.name.trim().split(' ');
    if(parts.length>=2){
      const initial=parts[0][0].toLowerCase();
      const last=parts.slice(-1)[0].toLowerCase();
      const matchKey=Object.keys(playerStats).find(k=>{
        const kp=k.split(' ');
        return kp.length>=2&&kp[0][0]===initial&&kp.slice(-1)[0]===last;
      });
      if(matchKey)raw=playerStats[matchKey];
    }
  }
  if(!raw)return null;
  // Return the right subset based on position
  const isPitcher=player.pos==='SP'||player.pos==='BULLPEN';
  return isPitcher?(raw._pitching||raw):(raw._batting||raw);
}

function HomeScreen({me,friends,challenges,onNav,onOpenDuel,onDemo,refresh,showToast,games,onLogout,onOpenSeries,activeSeries}){

    const updated=(notifs||[]).map(n=>({...n,read:true}));

  };
  const pending=challenges.filter(c=>c.dir==='in'&&c.status==='pending');
  const waitingForOpp=challenges.filter(c=>c.dir==='out'&&['pending','lineup_pending','drafting','ready'].includes(c.status)&&!['live','complete'].includes(c.status));
  const todayStart=new Date(); todayStart.setHours(0,0,0,0);
  // Helper: get MLB game start time for sorting
  const getGameTime=(c)=>{
    const g=G.find(x=>x.id===c.gameId)||c.gameData;
    const t=_optionalChain([g, 'optionalAccess', _283 => _283.time])||c.gameTime;
    if(!t)return 9999;
    const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if(!m)return 9999;
    let h=parseInt(m[1]),mn=parseInt(m[2]);
    if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;
    if(m[3].toUpperCase()==='AM'&&h===12)h=0;
    return h*60+mn;
  };
  // Dedup challenges: for same gameId+opponent, keep only the most advanced status
  const statusRank = s => (['lineup_pending','pending','drafting','ready','live','complete'].indexOf(s));
  const dedupedChallenges = Object.values(challenges.reduce((acc,c)=>{
    const key = (c.gameId||'')+'_'+(c.opponentId||c.challengerId||'');
    if(!acc[key]||statusRank(c.status)>statusRank(acc[key].status)) acc[key]=c;
    return acc;
  },{}));
  const allActive=dedupedChallenges.filter(c=>{
    // Today's lobby games (lineup not yet posted)
    if(c.status==='lineup_pending'){
      const todayStr=new Date().toLocaleDateString('en-CA');
      const gameDate=c.gameDate||'';
      if(!gameDate)return false; // no date = goes to scheduled section (unknown future game)
      return gameDate===todayStr;
    }
    if(['drafting','active','simulating','ready','live','pending'].includes(c.status)){
      const gd=c.gameDate||'';
      const todayStr=new Date().toLocaleDateString('en-CA');
      if(gd&&gd>todayStr)return false; // future → Scheduled
      if(gd&&gd<todayStr)return false; // past → archive (stale live game)
      return true;
    }
    // Completed games: show in Today's only if completed today
    if(c.status==='complete'){
      const todayStr=new Date().toLocaleDateString('en-CA');
      const gameDate=c.gameDate||'';
      if(gameDate)return gameDate===todayStr;
      // No gameDate: use completedAt or lastUpdated (NOT createdAt — that's when challenge was made)
      const ts=c.completedAt||c.lastUpdated||0;
      if(!ts)return false; // no timing info at all — don't show in Today's
      return ts>=todayStart.getTime();
    }
    return false;
  }).sort((a,b)=>getGameTime(a)-getGameTime(b));
  // Yesterday and older completed games go to the archive
  const completedOld=dedupedChallenges.filter(c=>{
    if(c.status!=='complete')return false;
    const todayStr=new Date().toLocaleDateString('en-CA');
    const gameDate=c.gameDate||'';
    if(gameDate)return gameDate<todayStr;
    // Use completedAt or lastUpdated (NOT createdAt)
    const ts=c.completedAt||c.lastUpdated||0;
    if(!ts)return true; // no timing — show in archive to be safe

// ── Friend system backed by Firebase ──
// Stores friends:{userId} = [{id, name, avatar, color, joinCode, status:'pending'|'accepted'}]
async function getFriendsList(userId) {
  const stored = await sget('friends:'+userId);
  return Array.isArray(stored) ? stored : [];
}
async function saveFriendsList(userId, list) {
  await sset('friends:'+userId, list);
  // Also keep localStorage in sync as a cache
  localStorage.setItem('dd_friends_v2:'+userId, JSON.stringify(list.filter(f=>f.status==='accepted').map(f=>f.id)));
}
async function sendFriendRequest(me, targetProfile) {
  // Add pending entry to my list
  const myList = await getFriendsList(me.id);
  if(!myList.find(f=>f.id===targetProfile.id)){
    myList.push({id:targetProfile.id, name:targetProfile.name, avatar:targetProfile.avatar||'⚾',
      color:targetProfile.color||'#4a9eff', joinCode:targetProfile.joinCode, status:'pending'});
    await saveFriendsList(me.id, myList);
  }
  // Send friend_request notif to target
  const notifs = (await sget('notifs:'+targetProfile.id))||[];
  const already = notifs.find(n=>n.type==='friend_request'&&n.fromId===me.id);
  if(!already){
    notifs.unshift({id:'fr_'+Math.random().toString(36).slice(2,8), type:'friend_request',
      from:me.name, fromId:me.id, fromAvatar:me.avatar||'⚾', fromColor:me.color||'#4a9eff',
      fromCode:me.joinCode, msg:me.name+' wants to be your friend!', ts:Date.now(), read:false});
    await sset('notifs:'+targetProfile.id, notifs.slice(0,50));
  }
}
async function acceptFriendRequest(me, requestNotif) {
  const friendProfile = {id:requestNotif.fromId, name:requestNotif.from,
    avatar:requestNotif.fromAvatar||'⚾', color:requestNotif.fromColor||'#4a9eff',
    joinCode:requestNotif.fromCode||'', status:'accepted'};
  // Add to my friends list
  const myList = await getFriendsList(me.id);
  if(!myList.find(f=>f.id===friendProfile.id)){
    myList.push(friendProfile);
  } else {
    const idx = myList.findIndex(f=>f.id===friendProfile.id);
    myList[idx] = {...myList[idx], status:'accepted'};
  }
  await saveFriendsList(me.id, myList);
  // Update their list - mark me as accepted
  const theirList = await getFriendsList(friendProfile.id);
  const myEntry = {id:me.id, name:me.name, avatar:me.avatar||'⚾', color:me.color||'#4a9eff',
    joinCode:me.joinCode, status:'accepted'};
  if(!theirList.find(f=>f.id===me.id)){
    theirList.push(myEntry);
  } else {
    const idx = theirList.findIndex(f=>f.id===me.id);
    theirList[idx] = {...theirList[idx], status:'accepted'};
  }
  await saveFriendsList(friendProfile.id, theirList);
  // Notify them that you accepted
  const theirNotifs = (await sget('notifs:'+friendProfile.id))||[];
  theirNotifs.unshift({id:'fra_'+Math.random().toString(36).slice(2,8), type:'friend_accepted',
    from:me.name, fromId:me.id, fromAvatar:me.avatar||'⚾', fromColor:me.color||'#4a9eff',
    msg:me.name+' accepted your friend request!', ts:Date.now(), read:false});
  await sset('notifs:'+friendProfile.id, theirNotifs.slice(0,50));
}
async function declineFriendRequest(me, requestNotif) {
  // Just remove the notif - don't add to either list
  const notifs = (await sget('notifs:'+me.id))||[];
  await sset('notifs:'+me.id, notifs.filter(n=>n.id!==requestNotif.id));
}

function PlayerStatsContent({player, game, side}){
  const tabs = ['overview','splits','gamelog','career'];
  const [activeTab, setActiveTab] = React.useState('overview');
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const isPit = player.isPitcher || player.pos==='SP' || player.pos==='RP' || player.pos==='BULLPEN';
  const group = isPit ? 'pitching' : 'hitting';
  const oppSP = side==='away' ? game?.homeSP : game?.awaySP;
  const yr = new Date().getFullYear();

  React.useEffect(() => {
    if(!player.mlbId && player.pos!=='BULLPEN'){ setLoading(false); return; }
    setLoading(true);
    const load = async () => {
      // BULLPEN: fetch combined stats from all relievers on the team's active roster
      if(player.pos==='BULLPEN' && player.teamId){
        try{
          const roster = await fetchTeamRoster(player.teamId);
          const relievers = (roster.pitchers||[]).filter(p=>p.pos!=='SP');
          if(relievers.length){
            // Aggregate season stats
            let ip=0,k=0,er=0,bb=0,sv=0,w=0;
            relievers.forEach(p=>{ip+=0;k+=p.k||0;sv+=p.sv||0;w+=p.w||0;}); // IP not in roster
            // Fetch season pitching stats for top relievers (by SV+K)
            const top=relievers.slice(0,8);
            const pitchStats=await Promise.all(top.map(p=>p.mlbId?fetchSeasonStats(p.mlbId,'pitching',yr):null));
            let aggIpOuts=0,aggK=0,aggER=0,aggBB=0,aggSV=0,aggW=0;
            pitchStats.forEach(s=>{
              if(!s)return;
              const ipParts=String(s.inningsPitched||'0.0').split('.');
              aggIpOuts+=parseInt(ipParts[0]||0)*3+parseInt(ipParts[1]||0);
              aggK+=s.strikeOuts||0; aggER+=s.earnedRuns||0;
              aggBB+=s.baseOnBalls||0; aggSV+=s.saves||0; aggW+=s.wins||0;
            });
            const aggIp=Math.floor(aggIpOuts/3)+'.'+(aggIpOuts%3);
            const aggEra=aggIpOuts>0?((aggER*27/aggIpOuts).toFixed(2)):'0.00';
            const season={inningsPitched:aggIp,strikeOuts:aggK,earnedRuns:aggER,
              baseOnBalls:aggBB,saves:aggSV,wins:aggW,era:aggEra,
              _combined:true,_count:top.length};
            setData({season,l7:null,l30:null,prev:null,handSplits:{},vsSP:null,gameLog:[],career:{},splits:[],
              _relievers:top.map(p=>p.name).join(', ')});
            setLoading(false); return;
          }
        }catch(e){}
        setLoading(false); return;
      }
      const [season, l7, l30, prev] = await Promise.all([
        fetchSeasonStats(player.mlbId, group, yr),
        fetchLastNGames(player.mlbId, group, 7),
        fetchLastNGames(player.mlbId, group, 30),
        fetchPrevSeasonStats(player.mlbId, group),
      ]);
      const handSplits = await fetchHandSplits(player.mlbId, group);
      let vsSP = null;
      if(!isPit && oppSP?.mlbId){
        const raw = await fetchBatterVsPitcher(player.mlbId, oppSP.mlbId);
        if(raw?.atBats > 0) vsSP = raw;
      }
      const glUrl = `https://statsapi.mlb.com/api/v1/people/${player.mlbId}/stats?stats=gameLog&group=${group}&season=${yr}&gameType=R`;
      const glData = await mlbGet(glUrl);
      const gameLog = (glData?.stats?.[0]?.splits||[]).slice(-15).reverse();
      const careerUrl = `https://statsapi.mlb.com/api/v1/people/${player.mlbId}/stats?stats=career&group=${group}&gameType=R`;
      const careerData = await mlbGet(careerUrl);
      const career = careerData?.stats?.[0]?.splits?.[0]?.stat||{};
      const monthUrl = `https://statsapi.mlb.com/api/v1/people/${player.mlbId}/stats?stats=statSplits&group=${group}&season=${yr}&gameType=R`;
      const monthData = await mlbGet(monthUrl);
      const splits = monthData?.stats?.[0]?.splits||[];
      setData({season, l7, l30, prev, handSplits, vsSP, gameLog, career, splits});
      setLoading(false);
    };
    load();
  }, [player.mlbId]);

  const SRow = ({label, val, highlight}) => React.createElement('div',{
    style:{display:'flex',justifyContent:'space-between',alignItems:'center',
      padding:'7px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}},
    React.createElement('span',{style:{fontSize:12,color:'#6b7a8d'}},label),
    React.createElement('span',{style:{fontSize:12,fontWeight:700,fontFamily:'monospace',
      color:highlight?'#3dd68c':'#e8edf2'}},val||'—')
  );

  const StatCard = ({label,s,accent}) => {
    if(!s||(!s.atBats&&!s.inningsPitched&&!s.era&&!s.avg)) return null;
    return React.createElement('div',{style:{background:'#141b22',border:'1px solid rgba(255,255,255,.07)',borderRadius:10,padding:'12px',marginBottom:8,borderLeft:'3px solid '+(accent||'#2a3540')}},
      React.createElement('div',{style:{fontSize:10,fontWeight:700,letterSpacing:1.5,color:accent||'#6b7a8d',textTransform:'uppercase',marginBottom:8}},label),
      isPit
        ? React.createElement(React.Fragment,null,
            React.createElement(SRow,{label:'ERA',  val:fmtEra(s.era)}),
            React.createElement(SRow,{label:'WHIP', val:fmtEra(s.whip)}),
            React.createElement(SRow,{label:'K',    val:s.strikeOuts||0}),
            React.createElement(SRow,{label:'BB',   val:s.baseOnBalls||0}),
            React.createElement(SRow,{label:'IP',   val:s.inningsPitched||0}),
            s.wins!=null&&React.createElement(SRow,{label:'W-L',val:(s.wins||0)+'-'+(s.losses||0)}),
          )
        : React.createElement(React.Fragment,null,
            React.createElement(SRow,{label:'AVG',  val:fmtAvg(s.avg),  highlight:parseFloat(s.avg)>.300}),
            React.createElement(SRow,{label:'OPS',  val:fmtOps(s.ops),  highlight:parseFloat(s.ops)>.850}),
            React.createElement(SRow,{label:'HR',   val:s.homeRuns||0}),
            React.createElement(SRow,{label:'RBI',  val:s.rbi||0}),
            React.createElement(SRow,{label:'SB',   val:s.stolenBases||0}),
            React.createElement(SRow,{label:'BB',   val:s.baseOnBalls||0}),
            s.atBats&&React.createElement(SRow,{label:'AB',val:s.atBats}),
          )
    );
  };

  const tabLabels = {overview:'Overview',splits:'Splits',gamelog:'Game Log',career:'Career'};

  return React.createElement(React.Fragment, null,
    // Tab bar
    React.createElement('div',{style:{display:'flex',borderBottom:'1px solid rgba(255,255,255,.07)',marginBottom:4}},
      tabs.map(t=>React.createElement('button',{key:t,onClick:()=>setActiveTab(t),
        style:{flex:1,padding:'9px 0',background:'none',border:'none',
          borderBottom:activeTab===t?'2px solid #f5c842':'2px solid transparent',
          color:activeTab===t?'#f5c842':'#4a5568',fontSize:10,fontWeight:activeTab===t?700:400,

async function processPendingInvite(me, invite) {
  const {inviteCode, inviteDuelId, inviteSeriesId} = invite;
  if(!inviteCode) return;
  try {
    const code = inviteCode.toUpperCase();
    // 1. Look up challenger by join code
    const idx = await sget('code_index') || {};
    const challengerId = idx[code];
    if(!challengerId || challengerId === me.id) return;

    // 2. Add challenger as friend
    const fl = JSON.parse(localStorage.getItem('dd_friends') || '[]');
    if(!fl.includes(challengerId)) {
      fl.push(challengerId);
      localStorage.setItem('dd_friends', JSON.stringify(fl));
    }

    // 3. Find the challenge — check by duelId first, then by pending_challenge code
    let ch = null;
    if(inviteDuelId) {
      const inbox = await sget('challenges:'+me.id) || [];
      ch = inbox.find(c => c.duelId === inviteDuelId);
      if(!ch) {
        // Check if stored by join code (new user flow)
        const pending = await sget('pending_challenge:'+code);
        if(pending && pending.duelId === inviteDuelId) ch = pending;
      }
    } else {
      // No duelId in URL — grab the most recent pending challenge from challenger
      ch = await sget('pending_challenge:'+code);
    }

    if(ch) {
      // Update challenge with recipient's real info
      const updated = {...ch, opponentId: me.id, opponentName: me.name,
        opponentAvatar: me.avatar||'⚾', opponentColor: me.color||'#e84545'};
      // Deliver to recipient inbox
      const inbox = await sget('challenges:'+me.id) || [];
      const alreadyThere = inbox.find(x => x.duelId === updated.duelId);
      if(!alreadyThere) {
        inbox.push(updated);
        await sset('challenges:'+me.id, inbox);
      }
      // Update challenger's sent list with opponent info
      const sent = await sget('challenges_sent:'+challengerId) || [];
      const updatedSent = sent.map(x => x.duelId === updated.duelId
        ? {...x, opponentId: me.id, opponentName: me.name, opponentAvatar: me.avatar||'⚾'}
        : x);
      await sset('challenges_sent:'+challengerId, updatedSent);
      // Also update the inbox entry for challenger (they stored by opp.id which may have been a placeholder)
      const challengerInbox = await sget('challenges:'+challengerId) || [];
      // Clean up the pending_challenge key (it's been claimed)
      await sset('pending_challenge:'+code, null);
    }
  } catch(e) {
    console.warn('processPendingInvite failed:', e);
  }
}
